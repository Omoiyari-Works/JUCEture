name: Android Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    # ソースファイルのタイムスタンプをGitコミット日時に復元
    # actions/checkoutはすべてのファイルを現在時刻のタイムスタンプで作成するため、
    # キャッシュされたオブジェクトファイルより新しくなり、Ninjaが全てを再コンパイルしてしまう。
    # Gitの履歴から各ファイルの最終コミット日時を取得し、タイムスタンプを設定することで、
    # キャッシュが有効に機能するようにする。
    - name: Install git-restore-mtime
      run: |
        curl -sSL https://raw.githubusercontent.com/MestreLion/git-tools/main/git-restore-mtime -o /tmp/git-restore-mtime
        chmod +x /tmp/git-restore-mtime
        sudo mv /tmp/git-restore-mtime /usr/local/bin/git-restore-mtime

    - name: Restore timestamps for main repository and submodules
      run: |
        echo "Restoring file timestamps from git history..."
        RESTORE_START=$(date +%s)

        # Main repository
        echo "Restoring main repository timestamps..."
        git-restore-mtime

        # Submodules (JUCE, JUCEture, etc.)
        echo "Restoring submodule timestamps..."
        git submodule foreach --recursive 'git-restore-mtime' > /dev/null 2>&1 || true

        RESTORE_END=$(date +%s)
        echo "Timestamp restoration completed in $((RESTORE_END - RESTORE_START)) seconds"

    # Gradleのキャッシュ設定
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('sampleApp/android/**/*.gradle*', 'sampleApp/android/**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    # CMakeビルドのキャッシュ設定（復元）
    - name: Restore CMake cache
      id: cmake-cache-restore
      uses: actions/cache/restore@v3
      with:
        path: |
          sampleApp/android/app/.cxx
        key: ${{ runner.os }}-cmake-${{ hashFiles('sampleApp/android/**/CMakeLists.txt', 'Source/**/*.cpp', 'Source/**/*.h') }}
        restore-keys: |
          ${{ runner.os }}-cmake-

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    # ディスク容量を確保
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true

    - name: Build sample app
      id: gradle_build
      working-directory: sampleApp/android
      run: |
        echo "=== Build Time Measurement Started ==="
        echo "Start time: $(date '+%Y-%m-%d %H:%M:%S')"
        BUILD_START=$(date +%s)

        chmod +x gradlew
        ./gradlew build --stacktrace

        BUILD_END=$(date +%s)
        echo "=== Build Time Measurement Summary ==="
        echo "Total build time: $((BUILD_END - BUILD_START)) seconds"
        echo "End time: $(date '+%Y-%m-%d %H:%M:%S')"

    # CMakeキャッシュの保存
    - name: Save CMake cache
      if: always()
      uses: actions/cache/save@v3
      with:
        path: |
          sampleApp/android/app/.cxx
        key: ${{ runner.os }}-cmake-${{ hashFiles('sampleApp/android/**/CMakeLists.txt', 'Source/**/*.cpp', 'Source/**/*.h') }}

    # ビルドレポートをアップロード
    - name: Upload build reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-reports
        path: |
          sampleApp/android/app/build/reports
        retention-days: 7
        if-no-files-found: warn

    # APKアーティファクトをアップロード
    - name: Upload APK artifact
      id: upload-apk
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-apk
        path: sampleApp/android/app/build/outputs/apk/**/*.apk
        retention-days: 7

    # プルリクエストにコメントを追加（成功時）
    - name: Comment PR with build result
      if: github.event_name == 'pull_request' && success()
      uses: actions/github-script@v7
      with:
        script: |
          const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
          const artifactUrl = `${{ steps.upload-apk.outputs.artifact-url }}`;
          const comment = `## ✅ Android Build Successful

          Build completed successfully!

          **Artifacts:** [Download APK](${artifactUrl})
          **Workflow run:** [View](${runUrl})`;

          // 既存のコメントを検索して更新
          const comments = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const botComment = comments.data.find(comment =>
            comment.user.type === 'Bot' &&
            comment.body.includes('Android Build')
          );

          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: comment
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
          }

    # プルリクエストにコメントを追加（失敗時）
    - name: Comment PR with build failure
      if: github.event_name == 'pull_request' && failure()
      uses: actions/github-script@v7
      with:
        script: |
          const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
          const comment = `## ❌ Android Build Failed

          The build failed. Please check the [workflow logs](${runUrl}) for details.`;

          // 既存のコメントを検索して更新
          const comments = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const botComment = comments.data.find(comment =>
            comment.user.type === 'Bot' &&
            comment.body.includes('Android Build')
          );

          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: comment
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
          }
